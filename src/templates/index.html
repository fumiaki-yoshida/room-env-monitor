<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>室内環境ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .meta { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-top: -20px; margin-bottom: 30px; }
        
        /* ダッシュボードのカード配置 */
        .cards { display: flex; gap: 20px; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 12px; flex: 1; min-width: 200px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h2 { margin: 0; font-size: 1em; color: #7f8c8d; text-transform: uppercase; }
        .value { font-size: 2.2em; font-weight: bold; margin: 10px 0; }
        
        /* ステータスカラー */
        .co2-normal { color: #2ecc71; }
        .co2-warning { color: #e74c3c; animation: blink 1s infinite alternate; }
        .temp-color { color: #e67e22; }
        .hum-color { color: #3498db; }
        
        /* グラフ用のカード */
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        @keyframes blink { from { opacity: 1; } to { opacity: 0.6; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>室内環境ダッシュボード</h1>
        <p class="meta">最終データ受信: {{ data.latest.timestamp }}</p>
        
        <div class="cards">
            <div class="card">
                <h2>CO2 濃度</h2>
                <div class="value {% if data.latest.co2 != '-' and data.latest.co2|int >= 1000 %}co2-warning{% else %}co2-normal{% endif %}">
                    {{ data.latest.co2 }} <span style="font-size: 0.5em;">ppm</span>
                </div>
            </div>
            <div class="card">
                <h2>室温</h2>
                <div class="value temp-color">
                    {{ data.latest.temp }} <span style="font-size: 0.5em;">°C</span>
                </div>
            </div>
            <div class="card">
                <h2>湿度</h2>
                <div class="value hum-color">
                    {{ data.latest.hum }} <span style="font-size: 0.5em;">%</span>
                </div>
            </div>
        </div>

        <div class="chart-card">
            <canvas id="envChart" style="width: 100%; height: 400px;"></canvas>
        </div>
    </div>

    <script>
        // Flaskから渡された履歴データをJavaScriptの配列に変換
        const historyData = {{ data.history | tojson }};
        
        // グラフ用のデータをパース
        const labels = historyData.map(row => row[0].split(' ')[1]); // 時間(hh:mm:ss)だけを抽出
        const co2Data = historyData.map(row => parseInt(row[1]));
        const tempData = historyData.map(row => parseFloat(row[2]));
        const humData = historyData.map(row => parseFloat(row[3]));

        // Chart.js の設定
        const ctx = document.getElementById('envChart').getContext('2d');
        const envChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'CO2 (ppm)',
                        data: co2Data,
                        borderColor: '#2ecc71',
                        backgroundColor: 'rgba(46, 204, 113, 0.1)',
                        yAxisID: 'y-co2',
                        tension: 0.2,
                        pointRadius: 1
                    },
                    {
                        label: '気温 (°C)',
                        data: tempData,
                        borderColor: '#e67e22',
                        yAxisID: 'y-env',
                        tension: 0.2,
                        pointRadius: 0
                    },
                    {
                        label: '湿度 (%)',
                        data: humData,
                        borderColor: '#3498db',
                        yAxisID: 'y-env',
                        tension: 0.2,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    'y-co2': {
                        type: 'linear',
                        position: 'left',
                        title: { display: true, text: 'CO2 濃度 (ppm)' },
                        suggestedMin: 400,
                        suggestedMax: 1200
                    },
                    'y-env': {
                        type: 'linear',
                        position: 'right',
                        title: { display: true, text: '気温 (°C) / 湿度 (%)' },
                        grid: { drawOnChartArea: false }, // グリッド線が重なって見づらくなるのを防ぐ
                        suggestedMin: 10,
                        suggestedMax: 80
                    }
                }
            }
        });
    </script>
</body>
</html>
